<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <nav>
        <h2>RecipeBook</h2>
        <a href="dashboard.html">Home</a>
        <a href="recipes.html">My Recipes</a>
        <a href="favorites.html">Favorites</a>
        <a href="community.html">Community</a>
        <button onclick="logout()">Logout</button>
    </nav>

    <div class="container">
        <h1>Recommended Recipes</h1>

        <div class="card">Recipe Example 1</div>
        <div class="card">Recipe Example 2</div>

        <hr>

        <h3>Test Authorization</h3>
        <button onclick="testAuth()">Test Authorization</button>
        <p id="authMessage"></p>
    </div>

    <script src="auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            requireAuth();
        });

        function testAuth() {
            const token = localStorage.getItem("token");
            const messageEl = document.getElementById("authMessage");

            if (token) {
                messageEl.innerText = "You are logged in! Token found.";
                messageEl.className = "success";
            } else {
                messageEl.innerText = "You are not logged in. Please log in.";
                messageEl.className = "error";
            }
        }
    </script>

</body>

</html>
