<!DOCTYPE html>
<html>

<head>
    <title>My Recipes</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <nav>
        <div>
            <a href="dashboard.html">Home</a>
            <a href="recipes.html">My Recipes</a>
            <a href="favorites.html">Favorites</a>
            <a href="community.html">Community</a>
            <a href="calendar.html">Calendar</a>
            <a href="aboutus.html">About Us</a>
        </div>

        <div id="profile-menu">
            <button id="profile-btn" onclick="window.location.href='profile.html'">
                Account Settings
            </button>
        </div>
    </nav>

    <div class="container">

        <h1>My Recipes</h1>

        <div class="card" style="margin-bottom:20px;">
            <h3>Filter Recipes</h3>
            <div style="display:flex; gap:16px; flex-wrap:wrap; align-items:flex-end;">
                <div>
                    <label for="timeFilter">Estimated Time</label><br>
                    <select id="timeFilter">
                        <option value="">All</option>
                        <option value="0-5">0-5 minutes</option>
                        <option value="5-15">5-15 minutes</option>
                        <option value="15-45">15-45 minutes</option>
                        <option value="45+">45-60+ minutes</option>
                    </select>
                </div>

                <div>
                    <label for="ratingFilter">Rating</label><br>
                    <select id="ratingFilter">
                        <option value="">All</option>
                        <option value="0-1">0-1 stars</option>
                        <option value="2-3">2-3 stars</option>
                        <option value="4-5">4-5 stars</option>
                    </select>
                </div>

                <div>
                    <label for="commentFilter">Comments</label><br>
                    <select id="commentFilter">
                        <option value="">All</option>
                        <option value="has_comments">Has comments</option>
                        <option value="no_comments">No comments</option>
                    </select>
                </div>

                <div>
                    <button id="applyFilters" type="button">Apply Filters</button>
                    <button id="clearFilters" type="button">Clear</button>
                </div>
            </div>
        </div>

        <button id="showCreate">🍋 Upload Recipe 🍋</button>

        <div class="nav-search" style="margin-bottom: 20px;">
            <input type="text" id="recipe-search" placeholder="Search your recipes..." onkeyup="filterRecipes()"
                style="width: 100%; padding: 10px;">
        </div>

        <div id="createForm" class="card" style="display:none; margin-top:20px;">
            <h3>New Recipe</h3>
            <form id="recipeForm" enctype="multipart/form-data">
                <label>Title (max 25):</label><br>
                <input type="text" id="title" maxlength="25" required><br>

                <label>Description (max 150):</label><br>
                <textarea id="description" maxlength="150" rows="4" required></textarea><br>

                <label>Estimated Time:</label><br>
                <input type="text" id="estimated_time" name="estimated_time"><br>

                <label>Picture (optional):</label><br>
                <input type="file" id="image" name="image" accept="image/*"><br>
                <div id="imagePreview" style="margin-top: 10px;"></div>

                <br>
                <button type="submit">Submit</button>
                <button type="button" id="cancelCreate">Cancel</button>
            </form>
            <p id="formMessage"></p>
        </div>

        <div id="feed" class="recipes-feed"></div>

    </div>

    <!-- COMMENT MODAL -->
    <div id="commentModal" class="modal-overlay hidden" aria-hidden="true">
        <div class="modal-content">
            <button class="modal-close" onclick="closeCommentModal()">×</button>

            <h3 id="commentModalTitle">Comments</h3>

            <div id="commentList" class="comment-list"></div>

            <textarea id="commentInput" placeholder="Write your comment..." maxlength="500"></textarea>

            <button id="commentSubmitButton" onclick="submitComment()">
                Post Comment
            </button>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="recipes.js"></script>

    <div class="zestify-corner-logo">
        <img src="../uploads/Zestify.png" alt="Zestify Logo">
    </div>

</body>

</html>
