<!DOCTYPE html>
<html>

<head>
    <title>Edit Recipe</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="shopping-list.css">
</head>

<body>

    <div class="lemon-field" aria-hidden="true">
        <span class="lemon lemon-1">🍋</span>
        <span class="lemon lemon-2">🍋</span>
        <span class="lemon lemon-3">🍋</span>
        <span class="lemon lemon-4">🍋</span>
        <span class="lemon lemon-5">🍋</span>
        <span class="lemon lemon-6">🍋</span>
    </div>

    <nav>
        <div>
            <a href="dashboard.html">Home</a>
            <a href="recipes.html">My Recipes</a>
        </div>

        <div id="profile-menu">
            <button id="profile-btn" onclick="window.location.href='profile.html'">
                Account Settings
            </button>
        </div>
    </nav>

    <div class="container">
        <h1>Edit Recipe</h1>

        <a href="recipes.html" class="recipe-section-btn"
            style="display:inline-block; margin-bottom: 20px; text-decoration: none;">Back to My Recipes</a>

        <div id="editForm" class="card">
            <form id="recipeForm" enctype="multipart/form-data">
                <div id="edit-form-status" class="edit-form-status hidden" aria-live="polite"></div>

                <input type="text" id="title" placeholder="Title" maxlength="25" required>
                <textarea id="description" placeholder="Description" maxlength="800" required></textarea>
                <input type="text" id="estimated_time" placeholder="Estimated Time">

                <h4>Ingredients</h4>
                <div id="ingredientsContainer"></div>
                <button type="button" id="addIngredientBtn" class="recipe-section-btn">+ Add Ingredient</button>

                <h4>Instructions</h4>
                <textarea id="instructions" required></textarea>

                <input type="file" id="image" accept="image/*">
                <div id="imagePreview"></div>

                <div class="form-actions">
                    <button type="submit" id="update-recipe-btn" class="recipe-section-btn">Save Changes</button>
                    <button type="button" id="cancelEdit" class="recipe-section-btn cancel-btn"
                        onclick="window.location.href='recipes.html'">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <button id="shopping-list-btn" class="shopping-list-btn">🛒</button>

    <div id="shopping-modal" class="shopping-modal-overlay">
        <div class="modal-content-shopping">
            <span class="shopping-close-btn">&times;</span>
            <h2>Shopping List</h2>
            <textarea id="shopping-list-text"></textarea>
            <button id="save-shopping-btn">Save Changes</button>
            <div id="save-status"></div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="shopping.js"></script>
    <script src="editRecipe.js"></script>

    <div class="zestify-corner-logo">
        <img src="../uploads/Zestify.png" alt="Zestify Logo">
    </div>

</body>

</html>
