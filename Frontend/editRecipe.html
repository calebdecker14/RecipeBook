<!DOCTYPE html>
<html>

<head>
    <title>Edit Recipe</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <nav>
        <a href="dashboard.html">Home</a>
        <a href="recipes.html">My Recipes</a>
    </nav>

    <div class="container">
        <h2>Edit Recipe</h2>

        <input id="title" placeholder="Recipe Title"><br><br>

        <textarea id="description" placeholder="Recipe Description" maxlength="800" rows="5"></textarea>
        <p id="char-count">0 / 800</p>

        <details class="expand-section">
            <summary>Ingredients</summary>
            <div id="ingredients-section">
                <div class="ingredient-row">
                    <input type="checkbox">
                    <input type="text" class="ingredient-input" placeholder="2 cups flour">
                </div>
                <button onclick="addIngredient()">+ Add Ingredient</button>
            </div>
        </details>

        <details class="expand-section">
            <summary>Instructions</summary>
            <div id="instructions-section">
                <div class="instruction-row">
                    <input type="text" class="instruction-input" placeholder="Step 1">
                </div>
                <button onclick="addInstruction()">+ Add Step</button>
            </div>
        </details>

        <br>
        <button onclick="updateRecipe()">Update Recipe</button>
    </div>

    <script src="auth.js"></script>
    <script src="editRecipe.js"></script>

</body>

</html>
